<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Secure User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark navbar-secure">
    <div class="container">
      <a class="navbar-brand" href="/">SecureUserMgmt</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="#" data-action="logout">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-5 fade-in">
    <h2 class="mb-4">My Profile</h2>
    <div id="profile-alert"></div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card dashboard-card p-4">
          <h5>Profile Information</h5>
          <form id="profile-form" class="mt-3">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="profile-name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="profile-email" disabled>
              <small class="text-muted">Email cannot be changed</small>
            </div>
            <div class="mb-3">
              <label class="form-label">Role</label>
              <input type="text" class="form-control" id="profile-role" disabled>
            </div>
            <div class="mb-3">
              <label class="form-label">Member Since</label>
              <input type="text" class="form-control" id="profile-created" disabled>
            </div>
            <button type="submit" class="btn btn-primary-custom" id="profile-btn">Update Profile</button>
          </form>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card dashboard-card p-4" id="change-password">
          <h5>Change Password</h5>
          <form id="password-form" class="mt-3">
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-control" id="current-password" required>
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" id="new-password" required minlength="8">
              <div id="new-password-strength" class="password-strength"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm New Password</label>
              <input type="password" class="form-control" id="confirm-new-password" required>
            </div>
            <button type="submit" class="btn btn-warning" id="password-btn">Change Password</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const authorized = await requireAuth();
      if (!authorized) return;

      try {
        const data = await userAPI.getProfile();
        const user = data.data.user;
        document.getElementById('profile-name').value = user.name;
        document.getElementById('profile-email').value = user.email;
        document.getElementById('profile-role').value = user.role;
        document.getElementById('profile-created').value = formatDate(user.createdAt);
      } catch (error) {
        showAlert('profile-alert', error.message);
      }

      document.getElementById('new-password').addEventListener('input', (e) => {
        updatePasswordStrengthIndicator(e.target.value, 'new-password-strength');
      });

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('profile-alert');
        const btn = document.getElementById('profile-btn');
        setButtonLoading(btn, true);
        try {
          const data = await userAPI.updateProfile({
            name: document.getElementById('profile-name').value.trim(),
          });
          setCurrentUser(data.data.user);
          showAlert('profile-alert', 'Profile updated successfully', 'success');
        } catch (error) {
          showAlert('profile-alert', error.message);
        } finally {
          setButtonLoading(btn, false, 'Update Profile');
        }
      });

      document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('profile-alert');
        const btn = document.getElementById('password-btn');
        setButtonLoading(btn, true);
        try {
          await userAPI.changePassword({
            currentPassword: document.getElementById('current-password').value,
            newPassword: document.getElementById('new-password').value,
            confirmPassword: document.getElementById('confirm-new-password').value,
          });
          showAlert('profile-alert', 'Password changed. Redirecting to login...', 'success');
          setTimeout(() => handleLogout(), 2000);
        } catch (error) {
          showAlert('profile-alert', error.message);
        } finally {
          setButtonLoading(btn, false, 'Change Password');
        }
      });
    });
  </script>
</body>
</html>
