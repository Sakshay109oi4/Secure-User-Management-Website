<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Secure User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark navbar-secure">
    <div class="container">
      <a class="navbar-brand" href="/">SecureUserMgmt</a>
    </div>
  </nav>

  <div class="container">
    <div class="card auth-card fade-in">
      <div class="card-header">
        <h4 class="mb-0">Sign In</h4>
        <small>Access your secure account</small>
      </div>
      <div class="card-body">
        <div id="login-alert"></div>
        <form id="login-form" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
          </div>
          <button type="submit" class="btn btn-primary-custom w-100" id="login-btn">Sign In</button>
        </form>
        <p class="text-center mt-3 mb-0">
          Don't have an account? <a href="/register">Register here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await redirectIfAuthenticated();

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('login-alert');

        const btn = document.getElementById('login-btn');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          showAlert('login-alert', 'Please fill in all fields');
          return;
        }

        setButtonLoading(btn, true);

        try {
          const data = await authAPI.login({ email, password });
          setCurrentUser(data.data.user);
          window.location.href = data.data.user.role === 'admin' ? '/admin' : '/dashboard';
        } catch (error) {
          showAlert('login-alert', error.message);
          if (error.errors) {
            error.errors.forEach((err) => showAlert('login-alert', `${err.field}: ${err.message}`));
          }
        } finally {
          setButtonLoading(btn, false, 'Sign In');
        }
      });
    });
  </script>
</body>
</html>
