<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Secure User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark navbar-secure">
    <div class="container">
      <a class="navbar-brand" href="/">SecureUserMgmt</a>
    </div>
  </nav>

  <div class="container">
    <div class="card auth-card fade-in">
      <div class="card-header">
        <h4 class="mb-0">Create Account</h4>
        <small>Join our secure platform</small>
      </div>
      <div class="card-body">
        <div id="register-alert"></div>
        <form id="register-form" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" required minlength="2" maxlength="50" placeholder="John Doe">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required minlength="8" placeholder="Min 8 chars, mixed case, number, symbol">
            <div id="password-strength" class="password-strength"></div>
            <small class="text-muted">Must include uppercase, lowercase, number, and special character (@$!%*?&)</small>
          </div>
          <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter password">
          </div>
          <button type="submit" class="btn btn-primary-custom w-100" id="register-btn">Create Account</button>
        </form>
        <p class="text-center mt-3 mb-0">
          Already have an account? <a href="/login">Sign in here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await redirectIfAuthenticated();

      document.getElementById('password').addEventListener('input', (e) => {
        updatePasswordStrengthIndicator(e.target.value, 'password-strength');
      });

      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('register-alert');

        const btn = document.getElementById('register-btn');
        const formData = {
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
          confirmPassword: document.getElementById('confirmPassword').value,
        };

        setButtonLoading(btn, true);

        try {
          const data = await authAPI.register(formData);
          setCurrentUser(data.data.user);
          window.location.href = '/dashboard';
        } catch (error) {
          showAlert('register-alert', error.message);
          if (error.errors) {
            error.errors.forEach((err) => showAlert('register-alert', `${err.field}: ${err.message}`));
          }
        } finally {
          setButtonLoading(btn, false, 'Create Account');
        }
      });
    });
  </script>
</body>
</html>
