<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Secure User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body id="admin-page">
  <nav class="navbar navbar-expand-lg navbar-dark navbar-secure">
    <div class="container">
      <a class="navbar-brand" href="/">SecureUserMgmt</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/profile">Profile</a>
        <a class="nav-link" href="#" data-action="logout">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-5 fade-in">
    <h2 class="mb-4">Admin Dashboard</h2>
    <div id="admin-alert"></div>

    <div class="row g-4 mb-4">
      <div class="col-md-3">
        <div class="card dashboard-card stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total Users</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card dashboard-card stat-card">
          <div class="stat-value text-success" id="stat-active">0</div>
          <div class="stat-label">Active Users</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card dashboard-card stat-card">
          <div class="stat-value text-warning" id="stat-inactive">0</div>
          <div class="stat-label">Inactive Users</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card dashboard-card stat-card">
          <div class="stat-value text-info" id="stat-admins">0</div>
          <div class="stat-label">Administrators</div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card dashboard-card p-4">
          <h5>User Management</h5>
          <div class="table-responsive mt-3">
            <table class="table table-secure table-hover mb-0">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Joined</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <tr><td colspan="6" class="text-center py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
          <div id="pagination" class="mt-3"></div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card dashboard-card p-4">
          <h5>Recent Registrations</h5>
          <div id="recent-users-list" class="mt-3">
            <p class="text-muted">Loading...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
